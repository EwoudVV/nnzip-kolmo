name: determinism

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  fixed-determinism:
    name: fixed determinism (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos
            os: macos-latest
          - label: windows
            os: windows-latest
          - label: linux
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run fixed-point tests
        shell: bash
        run: |
          python -m pytest \
            tests/test_fixed.py \
            tests/test_fixed_model.py \
            tests/test_fixed_optim.py \
            tests/test_fixed_train.py \
            -q

      - name: Write determinism transcript
        shell: bash
        run: |
          {
            echo "== hash_q15_matmul =="
            python benchmarks/determinism/hash_q15_matmul.py
            echo "== hash_fixed_forward =="
            python benchmarks/determinism/hash_fixed_forward.py
            echo "== hash_fixed_training =="
            python benchmarks/determinism/hash_fixed_training.py
            echo "== hash_fixed_compress =="
            python benchmarks/determinism/hash_fixed_compress.py
          } > "determinism-${{ matrix.label }}.txt"
          cat "determinism-${{ matrix.label }}.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: determinism-${{ matrix.label }}
          path: determinism-${{ matrix.label }}.txt

  compare-determinism:
    name: compare determinism transcripts
    runs-on: ubuntu-latest
    needs: fixed-determinism

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compare normalized transcripts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = sorted(Path("artifacts").glob("determinism-*/*.txt"))
          if not paths:
              raise SystemExit("no determinism artifacts found")

          transcripts = {}
          for path in paths:
              label = path.parent.name.removeprefix("determinism-")
              text = path.read_text(encoding="utf-8").replace("\r\n", "\n")
              transcripts[label] = text

          labels = sorted(transcripts)
          baseline = labels[0]
          baseline_text = transcripts[baseline]
          mismatches = []
          for label in labels[1:]:
              if transcripts[label] != baseline_text:
                  mismatches.append(label)

          print("Compared:", ", ".join(labels))
          if mismatches:
              for label in mismatches:
                  print(f"\n--- {baseline} ---")
                  print(baseline_text)
                  print(f"\n--- {label} ---")
                  print(transcripts[label])
              raise SystemExit(f"determinism mismatch: {', '.join(mismatches)}")

          print("\nDeterminism transcripts match exactly.")
          print(baseline_text)
          PY
